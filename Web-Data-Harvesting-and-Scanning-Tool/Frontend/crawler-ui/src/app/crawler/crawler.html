<div class="container">
  <h2>Web Crawler Dashboard</h2>

  <div class="input-group">
    <input [(ngModel)]="url" placeholder="Enter website URL (e.g., https://google.com)" [disabled]="loading">
    <div class="button-group">
      <button (click)="startCrawl()" [disabled]="loading" class="start-btn">Start Scan</button>
      <button (click)="stopCrawl()" [disabled]="!loading" class="stop-btn">Stop</button>
      <button (click)="exportToCSV()" [disabled]="links?.length === 0" class="export-btn">Export CSV</button>
    </div>
  </div>

  <div class="metrics" *ngIf="loading || (links?.length ?? 0) > 0">
    <div class="metric-card">
      <small>Queue</small>
      <strong>{{queueCount}}</strong>
    </div>
    <div class="metric-card">
      <small>Crawled</small>
      <strong>{{crawledCount}}</strong>
    </div>
    <div class="metric-card">
      <small>Success</small>
      <strong>{{successRate}}%</strong>
    </div>
  </div>

  <div class="intel-section" *ngIf="loading || (links?.length ?? 0) > 0">
    <div class="intel-header">
      <h3>📡 Site Intelligence</h3>
      <span class="badge" *ngIf="intel?.ip">{{intel.ip}}</span>
    </div>
    
    <div class="intel-grid">
      <div class="intel-box">
        <label>Nmap Scan</label>
        <pre>{{intel?.nmap}}</pre>
      </div>
      <div class="intel-box">
        <label>Robots.txt</label>
        <pre>{{intel?.robots}}</pre>
      </div>
      <div class="intel-box full-width">
        <label>WHOIS Record</label>
        <pre>{{intel?.whois}}</pre>
      </div>
    </div>
  </div>

  <div class="results-section" *ngIf="(links?.length ?? 0) > 0">
    <h3>Discovered Links ({{links.length}})</h3>
    <ul class="link-list">
      <li *ngFor="let link of links">
        {{link}}
      </li>
    </ul>
  </div>

  <div *ngIf="loading && (links?.length ?? 0) === 0" class="loading-message">
    <p>Initializing engine and gathering intelligence...</p>
  </div>
</div>
